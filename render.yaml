services:
  # ─── Facilitator Service ──────────────────────────────────────────────────────
  - type: web
    name: paystream-facilitator
    env: node
    plan: free
    region: ohio
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm build:packages && pnpm --filter @paystream/facilitator build
    startCommand: node apps/facilitator/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: STACKS_NETWORK
        value: testnet
      - key: STACKS_API_URL
        value: https://api.testnet.hiro.so
      - key: ALLOWED_ORIGINS
        sync: false  # Set in Render dashboard: your Vercel URLs + localhost

  # ─── Production API Server ────────────────────────────────────────────────────
  - type: web
    name: paystream-api
    env: node
    plan: free
    region: ohio
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm build:packages && pnpm --filter @paystream/api build
    startCommand: node apps/demo-server/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: STACKS_NETWORK
        value: testnet
      - key: STACKS_API_URL
        value: https://api.testnet.hiro.so
      # ─── Required: set these in the Render Dashboard ───────────────────────
      - key: MERCHANT_ADDRESS
        sync: false   # Your STX address e.g. ST1ABC...
      - key: MERCHANT_PRIVATE_KEY
        sync: false   # Hex private key for signing
      - key: FACILITATOR_URL
        sync: false   # URL of paystream-facilitator above
      - key: SUPABASE_URL
        sync: false   # https://xxxx.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false   # service_role key from Supabase dashboard
      - key: ALLOWED_ORIGINS
        sync: false   # comma-separated: https://your-dashboard.vercel.app,...
      # ─── Optional ──────────────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false   # For real AI responses on /api/ai/generate
